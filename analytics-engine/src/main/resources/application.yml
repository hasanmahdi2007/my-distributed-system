server:
  port: 8082

spring:
  application:
    name: analytics-engine
    
  # Connect exclusively to the analytics database room
  datasource:
    url: jdbc:postgresql://localhost:5432/analytics_db
    username: postgres
    password: ${POSTGRES_PASSWORD:password}
    driver-class-name: org.postgresql.Driver

  # Hibernate settings for the analytics schemas
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  data:
    redis:
      host: localhost
      port: 6379