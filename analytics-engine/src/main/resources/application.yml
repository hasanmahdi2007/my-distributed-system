server:
  port: 8082

spring:
  application:
    name: analytics-engine
    
  # Connect exclusively to the analytics database room
  datasource:
    # Defaults to localhost for IDE testing, but Docker can override it!
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/analytics_db
    username: postgres
    password: ${POSTGRES_PASSWORD:password}
    driver-class-name: org.postgresql.Driver

  # Hibernate settings for the analytics schemas
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        # The batching performance magic!
        jdbc.batch_size: 50
        order_inserts: true

  data:
    redis:
      # Apply the same Docker trick here so it can find the Redis container!
      host: ${REDIS_HOST:localhost}
      port: 6379