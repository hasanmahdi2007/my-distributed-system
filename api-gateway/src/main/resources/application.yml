server:
  port: 8080 

spring:
  application:
    name: api-gateway

  # --- 1. ROUTING (Spring Cloud Gateway) ---
  cloud:
    gateway:
      routes:
      
        - id: job-finder-route
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/jobs/**
          filters:
            - AddRequestHeader=X-Internal-Secret, super-secret-internal-key-123!


        - id: protected-api-route
          uri: https://httpbin.org
          predicates:
            - Path=/api/v1/external/**

  # --- 2. CACHE DATABASE (Redis for Rate Limiting) ---
  data:
    redis:
      # Apply the Docker trick so the Gateway can find Redis in the container network
      host: ${REDIS_HOST:localhost}
      port: 6379

  # --- 3. MAIN DATABASE (PostgreSQL for API Keys & Authentication) ---
  datasource:
    # Defaults to localhost for IDE testing, but Docker can override it!
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/gateway_db
    username: postgres
    # Wrapped in quotes to protect the special characters from YAML parsing errors
    password: "Hassouna10:)D"
    driver-class-name: org.postgresql.Driver

  # --- 4. ORM SETTINGS (JPA / Hibernate) ---
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect