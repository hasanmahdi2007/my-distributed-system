version: '3.8'

services:
  postgres-db:
    image: postgres:15-alpine
    container_name: gateway_db
    environment:
      POSTGRES_USER: gateway_admin
      POSTGRES_PASSWORD: supersecretpassword
      POSTGRES_DB: gateway_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: